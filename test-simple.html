<!DOCTYPE html>
<html>
<head>
  <title>Particle Test</title>
  <style>
    body { margin: 0; background: #000; color: #fff; font-family: sans-serif; }
    canvas { display: block; }
    #info { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.7); padding: 20px; border-radius: 8px; }
  </style>
</head>
<body>
  <div id="info">
    <h3>Particle Hero Test</h3>
    <p>Loading...</p>
    <p id="status">Initializing Three.js...</p>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const status = document.getElementById('status');
    let scrollProgress = 0;

    try {
      // Setup
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.z = 150;

      const canvas = document.createElement('canvas');
      document.body.insertBefore(canvas, document.body.firstChild);

      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setClearColor(0x0a0a0a);

      status.textContent = 'Creating particles...';

      // Create particles
      const positions = new Float32Array(1500 * 3);
      const colors = new Float32Array(1500 * 3);

      for (let i = 0; i < 1500; i++) {
        const i3 = i * 3;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.random() * Math.PI;
        const r = 50 + Math.random() * 50;

        positions[i3] = r * Math.sin(phi) * Math.cos(theta);
        positions[i3 + 1] = r * Math.cos(phi);
        positions[i3 + 2] = r * Math.sin(phi) * Math.sin(theta);

        colors[i3] = Math.random();
        colors[i3 + 1] = Math.random();
        colors[i3 + 2] = Math.random();
      }

      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

      const mat = new THREE.PointsMaterial({
        size: 2,
        vertexColors: true,
        transparent: true,
        opacity: 0.9
      });

      const particles = new THREE.Points(geo, mat);
      scene.add(particles);

      status.textContent = '✅ Ready! Scroll to animate';

      // Scroll
      window.addEventListener('scroll', () => {
        const h = document.documentElement.scrollHeight - window.innerHeight;
        scrollProgress = Math.min(window.scrollY / h, 1);
      });

      // Animation
      function animate() {
        particles.rotation.x = scrollProgress * Math.PI * 2;
        particles.rotation.y = scrollProgress * Math.PI * 4;
        particles.scale.setScalar(1 - scrollProgress * 0.7);

        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }
      animate();

      // Resize
      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

    } catch (err) {
      status.textContent = '❌ Error: ' + err.message;
      console.error(err);
    }
  </script>

  <div style="height: 220vh; background: #0a0a0a;"></div>
  <div style="padding: 4rem; background: #fff; color: #000;">
    <h2>✅ Working!</h2>
    <p>Scroll up to see particles react</p>
  </div>
</body>
</html>
